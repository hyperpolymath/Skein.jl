# SPDX-License-Identifier: MPL-2.0
name: CI
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: Julia ${{ matrix.julia-version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.10', '1.11']
        os: [ubuntu-latest]
        include:
          - julia-version: '1.11'
            os: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@e97f6fc1a6e21c82253c85e269be7340376aa425 # v2

      # Skein depends on the estate packages AcceleratorGate.jl (hard dep) and
      # KnotTheory.jl (weakdep) as adjacent path-deps — Manifest.toml pins
      # path = "../AcceleratorGate.jl" and "../KnotTheory.jl". Neither is in a
      # registry, so check them out as siblings before instantiate, otherwise
      # Pkg.instantiate() fails with "AcceleratorGate ... required but not installed".
      - name: Check out sibling estate path-deps
        run: |
          git clone --depth 1 https://github.com/hyperpolymath/AcceleratorGate.jl.git ../AcceleratorGate.jl
          git clone --depth 1 https://github.com/hyperpolymath/KnotTheory.jl.git ../KnotTheory.jl

      # The committed Manifest.toml is resolved against a specific Julia version;
      # Pkg.resolve() re-resolves it for this matrix's Julia (1.10/1.11) so the
      # stdlib entries (e.g. StyledStrings) match. Without it, instantiate fails:
      # "Could not locate the source code for the StyledStrings package ...
      #  manifest generated by a different version of Julia". It preserves the
      # KnotTheory weakdep-as-path arrangement (no Project.toml change).
      - name: Install, build, test
        run: julia --project=. -e 'using Pkg; Pkg.resolve(); Pkg.instantiate(); Pkg.build(); Pkg.test()'
